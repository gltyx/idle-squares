<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Golden trophy/star placeholder for achievements -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffec80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Star shape -->
  <polygon
    points="32,4 39,24 60,24 43,38 50,58 32,46 14,58 21,38 4,24 25,24"
    fill="url(#goldGradient)"
    stroke="#b8860b"
    stroke-width="2"
  />
  <!-- Inner highlight -->
  <polygon
    points="32,12 36,24 48,24 38,32 42,44 32,38 22,44 26,32 16,24 28,24"
    fill="#ffec80"
    opacity="0.4"
  />
</svg>
